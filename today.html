<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today - Sync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="screen">
      <div class="tag" id="prompt-category"></div>
      <h2 id="prompt-text">Loading today's question...</h2>

      <div id="answer-section">
        <textarea id="answer-input" placeholder="Your answer..." rows="5"></textarea>
        <button id="submit-answer-btn">Lock In Answer</button>
      </div>

      <div id="waiting-section" style="display:none;">
        <p>✅ Your answer is locked in.</p>
        <p>Waiting on your partner to answer too...</p>
      </div>

      <div id="reveal-section" style="display:none;">
        <div class="answer-card">
          <p class="label">You said:</p>
          <p id="my-answer-text"></p>
        </div>
        <div class="answer-card">
          <p class="label">They said:</p>
          <p id="partner-answer-text"></p>
        </div>
      </div>

      <button id="custom-prompt-btn" class="secondary">Ask a custom question instead</button>
    </div>

    <nav class="bottom-nav">
      <a href="today.html" class="active">Today</a>
      <a href="gallery.html">Gallery</a>
      <a href="games.html">Games</a>
      <a href="explore.html">Explore</a>
      <a href="timeline.html">Timeline</a>
      <a href="settings.html">Settings</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="today.js"></script>
</body>
</html>
