<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Sync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="screen">
      <h2>Settings</h2>

      <div class="answer-card">
        <p style="font-weight:bold;">Prompt Intensity</p>
        <p style="font-size:13px;color:#888;">Controls how spicy daily questions & games get.</p>
        <input type="range" id="intensity-slider" min="1" max="5" value="2" style="width:100%;">
        <p style="text-align:center;" id="intensity-val">2</p>
      </div>

      <div class="answer-card">
        <p style="font-weight:bold;">Notifications</p>
        <p style="font-size:13px;color:#888;">Get a daily reminder to answer today's question.</p>
        <button id="notif-btn">Enable Notifications</button>
        <p id="notif-status" style="font-size:13px;color:#888;"></p>
      </div>

      <div class="answer-card">
        <p style="font-weight:bold;">Vault PIN</p>
        <button id="reset-pin-btn" class="secondary">Reset Gallery PIN</button>
      </div>

      <div class="answer-card">
        <p style="font-weight:bold;">Room</p>
        <p style="font-size:13px;color:#888;">Code: <span id="room-code-display"></span></p>
        <button id="leave-room-btn" class="secondary">Leave Room</button>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="today.html">Today</a>
      <a href="gallery.html">Gallery</a>
      <a href="games.html">Games</a>
      <a href="explore.html">Explore</a>
      <a href="timeline.html">Timeline</a>
      <a href="settings.html" class="active">Settings</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="settings.js"></script>
</body>
</html>
